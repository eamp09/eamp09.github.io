<style>

/* ===== GLOBAL BACKGROUND UPGRADE ===== /

body{
  margin:0;
  font-family:'Open Sans',sans-serif;
  color:white;

  background:linear-gradient(
    270deg,
    #0C1F3E,
    #001a35,
    #002B55,
    #0C1F3E
  );

  background-size:400% 400%;
  animation:gradientMove 20s ease infinite;

  position:relative;
  overflow-x:hidden;
}

/ animated gradient /

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/ glowing data grid /

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
linear-gradient(#31A8FF22 1px, transparent 1px),
linear-gradient(90deg,#31A8FF22 1px, transparent 1px);

background-size:70px 70px;
opacity:0.15;

z-index:-2;
}

/ floating particles /

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:
radial-gradient(circle,#31A8FF55 1px, transparent 1px);

background-size:120px 120px;

animation:particlesMove 60s linear infinite;

z-index:-1;
}

@keyframes particlesMove{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

/ ===== TYPOGRAPHY ===== /

h1,h2{
  font-family:'Montserrat',sans-serif;
}

a{
  color:#31A8FF;
  text-decoration:none;
}

a:hover{
  color:white;
}

/ ===== HERO ===== /

.hero{
  background:#002B55;
  padding:60px 40px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.hero-text{
  text-align:center;
}

/ glowing hero title /

.hero-text h1{
  font-size:60px;
  color:#31A8FF;
  margin:0;
  text-shadow:
  0 0 10px #31A8FF55,
  0 0 20px #31A8FF33;
}

.hero-text p{
  font-size:1.3em;
  font-weight:600;
}

/ ===== TABS ===== /

.tab-container{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:40px;
  flex-wrap:wrap;
}

.tab-button{
  background:#002B55;
  border:none;
  padding:12px 25px;
  border-radius:8px;
  cursor:pointer;
  font-size:1em;
  font-weight:600;
  color:white;
  transition:0.3s;
}

.tab-button.active{
  background:#31A8FF;
  color:#002B55;
}

.tab-content{
  display:none;
  max-width:1000px;
  margin:30px auto;
  padding:20px;
  background:#1E2E4B;
  border-radius:10px;
}

.tab-content.active{
  display:block;
}

/ ===== PROFESSIONAL SUMMARY ===== /

.about-summary{
display:flex;
align-items:center;
justify-content:space-between;
gap:40px;
margin-bottom:40px;
}

.about-text{
flex:1.4;
}

.about-text h2{
color:#31A8FF;
margin-top:0;
}

.about-text h4{
margin-top:5px;
font-weight:600;
opacity:0.9;
}

.about-text p{
line-height:1.7;
margin-top:15px;
}

.about-photo{
flex:1;
display:flex;
justify-content:center;
}

.about-photo img{
width:100%;
max-width:220px;
height:auto;
object-fit:cover;
border-radius:10px;
}

/ ===== STORY CARDS ===== /

.story-card{
  position:relative;
  overflow:hidden;
  border-radius:10px;
  margin-bottom:30px;
  height:220px;
  display:flex;
  align-items:center;
  padding:40px;
  background:#002B55;
}

.story-img{
  position:absolute;
  top:0;
  height:100%;
  width:45%;
  object-fit:cover;
  right:0;
}

.story-card::before{
  content:"";
  position:absolute;
  right:45%;
  top:0;
  height:100%;
  width:30%;
  background:linear-gradient(to left, transparent, #002B55);
  z-index:1;
}

.story-text{
  position:relative;
  z-index:2;
  max-width:42%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-left:20px;
  padding-right:20px;
}

.story-text h3{
  margin:0;
  line-height:1.4;
  font-size:16px;
}

.story-text p{
  font-style:italic;
  margin-top:12px;
  line-height:1.6;
}

/ ===== SKILLS ===== /

ul.skills{
  list-style:none;
  padding:0;
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

ul.skills li{
  background:#002B55;
  padding:12px 18px;
  border-radius:8px;
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
}

/ ===== PROJECTS ===== /

.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.project-card{
  background:#003566;
  border-radius:10px;
  padding:25px;
}

.project-card h3{
  margin-top:0;
  color:#31A8FF;
}

/ ===== CAREER JOURNEY ===== /

.career-journey{
  background:#003566;
  border-radius:8px;
  padding:10px;
  margin:30px auto;
  max-width:1000px;
  text-align:center;
}

.career-journey h3{
  font-size:32px;
  font-weight:700;
  margin:20px 0;
}

.career-journey p{
  margin:0;
  line-height:1.6;
  font-style:italic;
}

/ ===== FOOTER ===== /

footer{
  background:#002B55;
  text-align:center;
  padding:25px;
  font-size:0.9em;
  margin-top:40px;
}

/ ===== MOBILE ===== */

@media(max-width:768px){

.about-summary{
flex-direction:column;
text-align:center;
}

.about-photo img{
width:180px;
height:180px;
margin-top:20px;
}

.story-card{
flex-direction:column;
height:auto;
}

.story-img{
position:relative;
width:100%;
height:200px;
margin-top:15px;
}

.story-card::before{
display:none;
}

.story-text{
max-width:100%;
text-align:center;
}

.career-journey{
padding:10px;
}

}

</style>
